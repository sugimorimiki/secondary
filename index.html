<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐉 セカンダリー</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    height: 100dvh; display: flex; flex-direction: column;
    background: #0a0e1a; color: #e2e8f0;
    font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
    font-size: 13px; overflow: hidden;
  }
  header {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    border-bottom: 1px solid #1e293b; padding: 14px 20px;
    flex-shrink: 0; box-shadow: 0 4px 24px rgba(0,0,0,.5);
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; justify-content: space-between; align-items: center;
  }
  .logo { font-size: 20px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.5px; }
  .meta { font-size: 11px; color: #64748b; margin-top: 3px; }
  .dl-btn {
    background: rgba(16,185,129,.15); border: 1px solid rgba(16,185,129,.4);
    color: #34d399; border-radius: 8px; padding: 8px 16px;
    cursor: pointer; font-size: 12px; font-weight: 600; flex-shrink: 0;
  }
  .dl-btn:hover { background: rgba(16,185,129,.25); }
  .tab-bar {
    flex-shrink: 0; border-bottom: 1px solid #1e293b; background: #0a0e1a;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tabs { display: flex; gap: 6px; padding: 10px 20px; flex-wrap: nowrap; width: max-content; }
  .tab {
    background: rgba(30,41,59,.8); border: 1px solid #334155;
    color: #94a3b8; border-radius: 20px; padding: 5px 18px;
    cursor: pointer; font-size: 12px; font-weight: 500;
    white-space: nowrap; -webkit-tap-highlight-color: transparent;
  }
  .tab.active {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-color: #6366f1; color: #fff; font-weight: 700;
  }
  .table-wrap {
    flex: 1; overflow-y: auto; overflow-x: auto;
    -webkit-overflow-scrolling: touch; padding: 0 20px 40px;
  }
  table { width: 100%; border-collapse: separate; border-spacing: 0; }
  thead th {
    background: #0f172a; color: #64748b; font-weight: 700; font-size: 11px;
    padding: 10px 12px; text-align: left; letter-spacing: 0.5px;
    border-bottom: 2px solid #1e293b; cursor: pointer;
    user-select: none; white-space: nowrap;
    position: sticky; top: 0; z-index: 10;
  }
  thead th.num { text-align: right; }
  tbody tr:nth-child(even) { background: rgba(15,23,42,.6); }
  tbody tr:nth-child(odd)  { background: rgba(30,41,59,.3); }
  tbody tr:hover { background: rgba(99,102,241,.08); }
  td { padding: 9px 12px; border-bottom: 1px solid #1a2438; vertical-align: middle; white-space: nowrap; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.name { font-weight: 600; }
  td.up   { color: #22c55e; font-weight: 700; }
  td.down { color: #ef4444; font-weight: 700; }
  td.flat { color: #94a3b8; font-weight: 700; }
  .badge { display: inline-block; border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 700; }
  .badge-p { background: #1e3a5f; color: #60a5fa; }
  .badge-s { background: #1a3a2a; color: #4ade80; }
  .badge-g { background: #2d1f3d; color: #c084fc; }
  .code-link {
    color: #a5b4fc; font-size: 12px; cursor: pointer;
    text-decoration: underline; text-underline-offset: 3px;
    text-decoration-color: rgba(165,180,252,.4);
  }
  .code-link:hover { color: #818cf8; text-decoration-color: #818cf8; }
</style>
</head>

const UPDATED = "2026-07-03";
const VER     = "202607030700";
const COLS    = ["上場年月","市場","銘柄コード","銘柄名","終値","前日比(%)","出来高","売買代金"];
const NUM     = new Set(["終値","前日比(%)","出来高","売買代金"]);
let activeTab = "全て", sortKey = null, sortDir = "asc";

(async function bustCache() {
  const KEY = "sec_ver";
  const stored = localStorage.getItem(KEY);
  if (stored !== VER) {
    localStorage.setItem(KEY, VER);
    if ("caches" in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    if (stored !== null) location.reload(true);
  }
})();

function fmt(v) { const n=parseFloat(v); return isNaN(n)?(v||""):n.toLocaleString("ja-JP"); }
function badgeClass(m) {
  if(!m) return "badge-g";
  if(m.includes("Ｐ")||m.includes("P")) return "badge-p";
  if(m.includes("Ｓ")||m.includes("S")) return "badge-s";
  return "badge-g";
}
function openKabutan(code) {
  window.open("https://kabutan.jp/stock/?code="+encodeURIComponent(code),"_blank","noopener");
}
function getFiltered() { return activeTab==="全て"?DATA:DATA.filter(r=>r["上場年月"]===activeTab); }
function getSorted(rows) {
  if(!sortKey) return rows;
  return [...rows].sort((a,b)=>{
    const av=NUM.has(sortKey)?parseFloat(a[sortKey]):a[sortKey];
    const bv=NUM.has(sortKey)?parseFloat(b[sortKey]):b[sortKey];
    return sortDir==="asc"?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
  });
}
function renderTabs() {
  const years=["全て",...Array.from(new Set(DATA.map(r=>r["上場年月"]))).sort()];
  document.getElementById("tabs").innerHTML=years.map(y=>
    `<button class="tab${y===activeTab?" active":""}" onclick="selectTab('${y}')">${y}</button>`
  ).join("");
}
function selectTab(y) { activeTab=y; renderTabs(); renderTable(); }
function renderTable() {
  const filtered=getFiltered(), sorted=getSorted(filtered);
  document.getElementById("thead").innerHTML="<tr>"+COLS.map(col=>{
    const cls=NUM.has(col)?' class="num"':"";
    const arrow=sortKey===col?(sortDir==="asc"?" ▲":" ▼"):" ⇅";
    return `<th${cls} onclick="handleSort('${col}')">${col}${arrow}</th>`;
  }).join("")+"</tr>";
  document.getElementById("tbody").innerHTML=sorted.map(row=>{
    const chg=parseFloat(row["前日比(%)"]);
    const chgCls=chg>0?"up":chg<0?"down":"flat";
    const chgStr=(chg>0?"+":"")+(row["前日比(%)"]||"")+"%";
    const code=row["銘柄コード"]||"";
    return `<tr>
      <td>${row["上場年月"]||""}</td>
      <td><span class="badge ${badgeClass(row["市場"])}">${row["市場"]||""}</span></td>
      <td><span class="code-link" onclick="openKabutan('${code}')">${code}</span></td>
      <td class="name">${row["銘柄名"]||""}</td>
      <td class="num">${fmt(row["終値"])}</td>
      <td class="num ${chgCls}">${chgStr}</td>
      <td class="num">${fmt(row["出来高"])}</td>
      <td class="num">${fmt(row["売買代金"])}</td>
    </tr>`;
  }).join("");
  document.getElementById("meta-info").textContent=
    `${filtered.length} 件表示　|　最終更新: ${UPDATED}`;
}
function handleSort(key) {
  if(sortKey===key) sortDir=sortDir==="asc"?"desc":"asc";
  else { sortKey=key; sortDir="asc"; }
  renderTable();
}
function downloadCSV() {
  const rows=getSorted(getFiltered());
  const lines=[COLS.join(",")];
  rows.forEach(r=>lines.push(COLS.map(c=>`"${(r[c]||"")}"`).join(",")));
  const blob=new Blob(["\uFEFF"+lines.join("\n")],{type:"text/csv;charset=utf-8;"});
  const a=Object.assign(document.createElement("a"),{
    href:URL.createObjectURL(blob), download:`セカンダリー_${activeTab}.csv`
  });
  a.click();
}
renderTabs(); renderTable();
